# Reverse proxy template for production deployments.
# Use behind a managed HTTPS terminator (Vercel / Render / Cloudflare).

upstream kinz_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name kinz.example.com;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # API
    location /api/ {
        proxy_pass http://kinz_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /docs {
        proxy_pass http://kinz_api;
    }
    location /openapi.json {
        proxy_pass http://kinz_api;
    }
    location /health {
        proxy_pass http://kinz_api;
    }

    # Frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Log rotation is handled by logrotate outside nginx.
    access_log /var/log/nginx/kinz_access.log;
    error_log  /var/log/nginx/kinz_error.log warn;
}
