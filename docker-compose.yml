services:
  db:
    image: postgres:16-alpine
    container_name: kinz-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kinz_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-kinz_commerce}
    # Do NOT expose postgres to the host in production.
    # Comment out `ports` for prod deployments, or bind to 127.0.0.1 only.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - kinz_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kinz_app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kinz-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kinz_app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-kinz_commerce}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      JWT_ISSUER: ${JWT_ISSUER:-kinz-secure-commerce-hub}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-kinz-api}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      AUDIT_LOG_PATH: /var/log/kinz/audit.log
      AUDIT_LOG_MAX_BYTES: 10485760
      AUDIT_LOG_BACKUP_COUNT: 5
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ETL_RAW_DIR: /app/data/raw
      ETL_PROCESSED_DIR: /app/data/processed
      DEMO_USER_ENABLED: ${DEMO_USER_ENABLED:-true}
      DEMO_USER_EMAIL: ${DEMO_USER_EMAIL:-nassim@kinzoils.com}
      DEMO_USER_PASSWORD_HASH: ${DEMO_USER_PASSWORD_HASH:-}
      DEMO_USER_ROLE: ${DEMO_USER_ROLE:-admin}
      DEMO_USER_NAME: ${DEMO_USER_NAME:-Nassim K.}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - kinz_audit:/var/log/kinz
    # Read-only root filesystem — app writes only to /var/log/kinz (volume)
    # and /tmp (default Docker writable tmpfs).
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  web:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: kinz-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    read_only: true
    tmpfs:
      - /tmp:size=32M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

networks:
  backend:
    internal: true
  frontend:

volumes:
  kinz_pgdata:
  kinz_audit:
